name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install Linux system deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          # Core build tools and pkg-config
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            wget \
            file \
            patchelf \
            libssl-dev \
            rpm \
            flatpak \
            flatpak-builder \
            elfutils \
            xdg-utils
          # GTK/GLib stack for gdk-3.0, glib-2.0, gio-2.0
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev
          # WebKit2GTK (version differs across Ubuntu images; try 4.1 then 4.0)
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev \
            || sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.0-dev
          # libsoup also changed major version; prefer 3.0 with fallback to 2.4
          sudo apt-get install -y --no-install-recommends libsoup-3.0-dev \
            || sudo apt-get install -y --no-install-recommends libsoup2.4-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v6
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-${{ runner.arch }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Prepare Tauri signing key
        shell: bash
        run: |
          if [ -z "${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}" ]; then
            echo "⚠️ TAURI_SIGNING_PRIVATE_KEY 未配置，跳过 updater 签名。安装包仍会继续构建，但不会生成 .sig / latest.json 平台签名项。"
            echo "TAURI_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "TAURI_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          RAW="${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}"
          # 目标：向 Tauri CLI 提供规范化后的“单行 base64 包裹密钥”
          KEY_BLOB=""
          # 情况 1：原始两行文本（第一行以 "untrusted comment:" 开头）
          if echo "$RAW" | head -n1 | grep -q '^untrusted comment:'; then
            KEY_BLOB="$(printf '%s\n' "$RAW" | base64 | tr -d '\r\n')"
            echo "✅ 使用原始两行密钥，已转换为单行 base64 包裹格式"
          else
            # 情况 2：整体被 base64 包裹（解包后应当是两行原始密钥）
            if DECODED=$(printf '%s' "$RAW" | (base64 --decode 2>/dev/null || base64 -D 2>/dev/null)) \
               && echo "$DECODED" | head -n1 | grep -q '^untrusted comment:'; then
              KEY_BLOB="$(printf '%s' "$RAW" | tr -d '[:space:]')"
              echo "✅ 使用单行 base64 包裹密钥"
            else
              echo "❌ TAURI_SIGNING_PRIVATE_KEY 格式无法识别：既不是两行原文，也不是其 base64 包裹形式" >&2
              echo "密钥前10个字符: $(echo "$RAW" | head -c 10)..." >&2
              exit 1
            fi
          fi

          if ! printf '%s' "$KEY_BLOB" | grep -Eq '^[A-Za-z0-9+/=]+$'; then
            echo "❌ 归一化后的 Tauri 私钥不是单行 base64 包裹内容" >&2
            exit 1
          fi

          {
            echo "TAURI_SIGNING_PRIVATE_KEY<<__TAURI_KEY__"
            printf '%s\n' "$KEY_BLOB"
            echo "__TAURI_KEY__"
          } >> "$GITHUB_ENV"
          if [ -n "${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}" >> $GITHUB_ENV
          fi
          echo "✅ Tauri signing key prepared"

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.APPLE_CERTIFICATE }}" ] || \
             [ -z "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" ] || \
             [ -z "${{ secrets.KEYCHAIN_PASSWORD }}" ] || \
             [ -z "${{ secrets.APPLE_TEAM_ID }}" ] || \
             [ -z "${{ secrets.APPLE_API_KEY_ID }}" ] || \
             [ -z "${{ secrets.APPLE_API_ISSUER }}" ] || \
             [ -z "${{ secrets.APPLE_API_PRIVATE_KEY }}" ]; then
            echo "⚠️ Apple 签名/公证 secrets 不完整，跳过 macOS 签名与公证。"
            echo "APPLE_SIGNING_ENABLED=false" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "APPLE_SIGNING_ENABLED=true" >> "$GITHUB_ENV"
          echo "APPLE_NOTARIZATION_ENABLED=true" >> "$GITHUB_ENV"
          # Decode .p12 certificate from base64
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          printf '%s' "${{ secrets.APPLE_CERTIFICATE }}" | (base64 --decode 2>/dev/null || base64 -D) > "$CERT_PATH"

          # Save original default keychain for cleanup
          ORIGINAL_DEFAULT_KEYCHAIN=$(security default-keychain -d user | tr -d '"' | xargs)
          echo "ORIGINAL_DEFAULT_KEYCHAIN=$ORIGINAL_DEFAULT_KEYCHAIN" >> "$GITHUB_ENV"

          # Create temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          security create-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security default-keychain -s "$KEYCHAIN_PATH"
          security unlock-keychain -p "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "${{ secrets.APPLE_CERTIFICATE_PASSWORD }}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "${{ secrets.KEYCHAIN_PASSWORD }}" "$KEYCHAIN_PATH"

          # Dynamically resolve signing identity (must be "Developer ID Application")
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | grep -oE '"[^"]+"' | head -1 | tr -d '"')
          if [ -z "$IDENTITY" ]; then
            echo "❌ No 'Developer ID Application' identity found — listing all identities:" >&2
            security find-identity -v -p codesigning "$KEYCHAIN_PATH"
            exit 1
          fi
          echo "✅ Signing identity: $IDENTITY"
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"

          APPLE_API_KEY_PATH="$RUNNER_TEMP/AuthKey_${{ secrets.APPLE_API_KEY_ID }}.p8"
          printf '%s' "${{ secrets.APPLE_API_PRIVATE_KEY }}" > "$APPLE_API_KEY_PATH"
          chmod 600 "$APPLE_API_KEY_PATH"
          echo "APPLE_API_KEY_PATH=$APPLE_API_KEY_PATH" >> "$GITHUB_ENV"

          # Cleanup certificate file
          rm -f "$CERT_PATH"

      - name: Verify updater signing key
        if: env.TAURI_SIGNING_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TEST_FILE="$RUNNER_TEMP/tauri-signing-selftest.txt"
          printf '%s\n' "tauri signing selftest" > "$TEST_FILE"
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY:-}" > "$RUNNER_TEMP/tauri-signing-env.txt"
          pnpm tauri signer sign -f "$RUNNER_TEMP/tauri-signing-env.txt" -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$TEST_FILE"
          test -f "$TEST_FILE.sig"
          echo "✅ updater signing selftest passed"

      - name: Build Tauri App (macOS)
        if: runner.os == 'macOS'
        shell: bash
        timeout-minutes: 30
        env:
          APPLE_SIGNING_IDENTITY: ${{ env.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          MACOS_TARGET="x86_64-apple-darwin"
          # Build only the app bundle here. The updater tar.gz still comes from
          # createUpdaterArtifacts, and the DMG is created in Prepare macOS Assets.
          if [ "${TAURI_SIGNING_ENABLED:-false}" = "true" ]; then
            echo "=== macOS Intel app-only signed build (${MACOS_TARGET}) ==="
            pnpm tauri build --target "$MACOS_TARGET" --bundles app
          else
            echo "=== macOS Intel app-only build without updater signing (${MACOS_TARGET}) ==="
            pnpm tauri build --target "$MACOS_TARGET" --bundles app --config src-tauri/tauri.macos.no-updater.conf.json
          fi
          echo "✅ macOS build succeeded"

      - name: Build Tauri App (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TAURI_SIGNING_ENABLED:-false}" = "true" ]; then
            pnpm tauri build --bundles nsis
          else
            pnpm tauri build --bundles nsis --config src-tauri/tauri.windows.no-updater.conf.json
          fi

      - name: Build Tauri App (Linux)
        if: runner.os == 'Linux'
        run: pnpm tauri build --bundles appimage,deb,rpm

      - name: Prepare macOS Assets
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"  # e.g., v3.5.0
          MAC_ARCH="x86_64"

          # Locate bundle artifacts
          TAR_GZ=""; APP_PATH=""
          for path in \
            "target/universal-apple-darwin/release/bundle/macos" \
            "target/aarch64-apple-darwin/release/bundle/macos" \
            "target/x86_64-apple-darwin/release/bundle/macos" \
            "target/release/bundle/macos" \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$TAR_GZ" ]   && TAR_GZ=$(find "$path" -maxdepth 1 -name "*.tar.gz" -type f | head -1 || true)
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found" >&2
            exit 1
          fi

          if [ "${APPLE_SIGNING_ENABLED:-false}" = "true" ]; then
            echo "ℹ️ Signed macOS build detected; app notarization will be handled in the later DMG notarization step"
          else
            echo "ℹ️ Unsigned macOS build: skip app notarization handling"
          fi

          # 1) Collect .tar.gz (updater artifact)
          if [ -n "$TAR_GZ" ]; then
            NEW_TAR_GZ="CC-Switch-${VERSION}-macOS-${MAC_ARCH}.tar.gz"
            cp "$TAR_GZ" "release-assets/$NEW_TAR_GZ"
            [ -f "$TAR_GZ.sig" ] && cp "$TAR_GZ.sig" "release-assets/$NEW_TAR_GZ.sig" || echo ".sig for macOS not found yet"
            echo "macOS updater artifact copied: $NEW_TAR_GZ"
          else
            echo "ℹ️ No macOS .tar.gz updater artifact found, skip updater asset"
          fi

          # 2) Collect .app as zip
          NEW_ZIP="CC-Switch-${VERSION}-macOS-${MAC_ARCH}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "release-assets/$NEW_ZIP"
          echo "macOS zip ready: $NEW_ZIP"

          EXISTING_DMG=""
          for path in \
            "target/universal-apple-darwin/release/bundle/dmg" \
            "target/aarch64-apple-darwin/release/bundle/dmg" \
            "target/x86_64-apple-darwin/release/bundle/dmg" \
            "target/release/bundle/dmg" \
            "src-tauri/target/universal-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/dmg" \
            "src-tauri/target/release/bundle/dmg"; do
            if [ -d "$path" ]; then
              [ -z "$EXISTING_DMG" ] && EXISTING_DMG=$(find "$path" -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
            fi
          done

          if [ "${APPLE_SIGNING_ENABLED:-false}" = "true" ]; then
            if [ -z "${APPLE_SIGNING_IDENTITY:-}" ]; then
              echo "❌ APPLE_SIGNING_IDENTITY is missing before DMG creation" >&2
              exit 1
            fi

            HOMEBREW_NO_AUTO_UPDATE=1 brew install create-dmg
            NEW_DMG="CC-Switch-${VERSION}-macOS-${MAC_ARCH}.dmg"
            DMG_STAGE_DIR="$RUNNER_TEMP/dmg-stage"
            rm -rf "$DMG_STAGE_DIR"
            mkdir -p "$DMG_STAGE_DIR"
            ditto "$APP_PATH" "$DMG_STAGE_DIR/CC Switch.app"

            create-dmg \
              --volname "CC Switch" \
              --background "src-tauri/icons/dmg-background.png" \
              --window-size 660 400 \
              --window-pos 200 120 \
              --icon-size 80 \
              --icon "CC Switch.app" 180 220 \
              --hide-extension "CC Switch.app" \
              --app-drop-link 480 220 \
              --codesign "$APPLE_SIGNING_IDENTITY" \
              --no-internet-enable \
              "release-assets/$NEW_DMG" \
              "$DMG_STAGE_DIR"

            rm -rf "$DMG_STAGE_DIR"
            echo "✅ Styled DMG created: $NEW_DMG"
          elif [ -n "$EXISTING_DMG" ]; then
            cp "$EXISTING_DMG" "release-assets/CC-Switch-${VERSION}-macOS-${MAC_ARCH}.dmg"
            echo "ℹ️ Copied unsigned/default DMG from Tauri bundle"
          else
            echo "ℹ️ No DMG found for unsigned macOS build"
          fi

      - name: Notarize macOS DMG
        if: runner.os == 'macOS' && env.APPLE_SIGNING_ENABLED == 'true' && env.APPLE_NOTARIZATION_ENABLED == 'true'
        shell: bash
        timeout-minutes: 30
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY_PATH: ${{ env.APPLE_API_KEY_PATH }}
        run: |
          set -euo pipefail

          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -z "$DMG_PATH" ]; then
            echo "❌ No .dmg found in release-assets/ to notarize" >&2
            exit 1
          fi

          echo "=== Notarizing DMG: $DMG_PATH ==="
          max_attempts=3
          for attempt in $(seq 1 "$max_attempts"); do
            echo "=== DMG notarization attempt ${attempt}/${max_attempts} ==="
            if xcrun notarytool submit "$DMG_PATH" \
              --key "$APPLE_API_KEY_PATH" \
              --key-id "$APPLE_API_KEY" \
              --issuer "$APPLE_API_ISSUER" \
              --wait; then
              echo "✅ DMG notarization succeeded"
              xcrun stapler staple "$DMG_PATH"
              echo "✅ DMG stapled"
              break
            fi

            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "❌ DMG notarization failed after ${max_attempts} attempts" >&2
              exit 1
            fi

            sleep_seconds=$((attempt * 60))
            echo "⚠️ DMG notarization failed, retrying in ${sleep_seconds}s..."
            sleep "$sleep_seconds"
          done

      - name: Verify macOS code signing and notarization
        if: runner.os == 'macOS' && env.APPLE_SIGNING_ENABLED == 'true' && env.APPLE_NOTARIZATION_ENABLED == 'true'
        shell: bash
        run: |
          set -euo pipefail

          # Verify .app (from Tauri bundle)
          APP_PATH=""
          for path in \
            "target/universal-apple-darwin/release/bundle/macos" \
            "target/aarch64-apple-darwin/release/bundle/macos" \
            "target/x86_64-apple-darwin/release/bundle/macos" \
            "target/release/bundle/macos" \
            "src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$APP_PATH" ] && APP_PATH=$(find "$path" -maxdepth 1 -name "*.app" -type d | head -1 || true)
            fi
          done

          if [ -z "$APP_PATH" ]; then
            echo "❌ No .app found for verification" >&2
            exit 1
          fi
          echo "=== Verifying .app: $APP_PATH ==="
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"
          echo "✅ codesign verification passed"
          spctl -a -t exec -vv "$APP_PATH"
          echo "✅ spctl assessment passed"
          echo "ℹ️ Skipping .app stapler validation because notarization is performed on the packaged DMG"

          # Verify .dmg (from release-assets/, created by create-dmg + notarized)
          DMG_PATH=$(find release-assets -maxdepth 1 -name "*.dmg" -type f | head -1 || true)
          if [ -n "$DMG_PATH" ]; then
            echo "=== Verifying .dmg: $DMG_PATH ==="
            codesign --verify --verbose=2 "$DMG_PATH"
            echo "✅ .dmg codesign verification passed"
            spctl -a -t open --context context:primary-signature -vv "$DMG_PATH"
            echo "✅ .dmg spctl assessment passed"
            xcrun stapler validate "$DMG_PATH"
            echo "✅ .dmg stapler validation passed"
          else
            echo "❌ No .dmg found for verification — release would ship without verified DMG" >&2
            exit 1
          fi

      - name: Prepare Windows Assets
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $VERSION = $env:GITHUB_REF_NAME  # e.g., v3.5.0
          # 仅打包 NSIS .exe 安装器 + .sig（用于 Updater）
          $installer = Get-ChildItem -Path 'target/release/bundle/nsis' -Recurse -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $installer) {
            $installer = Get-ChildItem -Path 'src-tauri/target/release/bundle/nsis' -Recurse -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $installer) {
            # 兜底：全局搜索 NSIS .exe
            $installer = Get-ChildItem -Path 'target/release/bundle' -Recurse -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -eq $installer) {
            $installer = Get-ChildItem -Path 'src-tauri/target/release/bundle' -Recurse -Include *.exe -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($null -ne $installer) {
            $dest = "CC-Switch-$VERSION-Windows-Setup.exe"
            Copy-Item $installer.FullName (Join-Path release-assets $dest)
            Write-Host "Installer copied: $dest"
            $sigPath = "$($installer.FullName).sig"
            if (Test-Path $sigPath) {
              Copy-Item $sigPath (Join-Path release-assets ("$dest.sig"))
              Write-Host "Signature copied: $dest.sig"
            } else {
              Write-Warning "Signature not found for $($installer.Name)"
            }
          } else {
            throw 'No Windows NSIS installer found'
          }
          # 绿色版（portable）：仅可执行文件打 zip（不参与 Updater）
          $exeCandidates = @(
            'target/release/cc-switch.exe',
            'src-tauri/target/release/cc-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/cc-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -ne $exePath) {
            $portableDir = 'release-assets/CC-Switch-Portable'
            New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
            Copy-Item $exePath $portableDir
            $portableIniPath = Join-Path $portableDir 'portable.ini'
            $portableContent = @(
              '# CC Switch portable build marker',
              'portable=true'
            )
            $portableContent | Set-Content -Path $portableIniPath -Encoding UTF8
            $portableZip = "release-assets/CC-Switch-$VERSION-Windows-Portable.zip"
            Compress-Archive -Path "$portableDir/*" -DestinationPath $portableZip -Force
            Remove-Item -Recurse -Force $portableDir
            Write-Host "Windows portable zip created: CC-Switch-$VERSION-Windows-Portable.zip"
          } else {
            Write-Warning 'Portable exe not found'
          }

      - name: Prepare Linux Assets
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p release-assets
          VERSION="${GITHUB_REF_NAME}"  # e.g., v3.5.0
          ARCH="${{ matrix.arch || 'x86_64' }}"
          # Updater artifact: AppImage（含对应 .sig）
          APPIMAGE=$(find target/release/bundle src-tauri/target/release/bundle -name "*.AppImage" 2>/dev/null | head -1 || true)
          if [ -n "$APPIMAGE" ]; then
            NEW_APPIMAGE="CC-Switch-${VERSION}-Linux-${ARCH}.AppImage"
            cp "$APPIMAGE" "release-assets/$NEW_APPIMAGE"
            [ -f "$APPIMAGE.sig" ] && cp "$APPIMAGE.sig" "release-assets/$NEW_APPIMAGE.sig" || echo ".sig for AppImage not found"
            echo "AppImage copied: $NEW_APPIMAGE"
          else
            echo "No AppImage found under target/release/bundle" >&2
            exit 1
          fi
          # 额外上传 .deb（用于手动安装，不参与 Updater）
          DEB=$(find target/release/bundle src-tauri/target/release/bundle -name "*.deb" 2>/dev/null | head -1 || true)
          if [ -n "$DEB" ]; then
            cp "$DEB" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.deb"
            echo "Deb package copied: CC-Switch-${VERSION}-Linux-${ARCH}.deb"
          else
            echo "No .deb found (optional)"
          fi
          # 额外上传 .rpm（用于 Fedora/RHEL/openSUSE 等，不参与 Updater）
          RPM=$(find target/release/bundle src-tauri/target/release/bundle -name "*.rpm" 2>/dev/null | head -1 || true)
          if [ -n "$RPM" ]; then
            cp "$RPM" "release-assets/CC-Switch-${VERSION}-Linux-${ARCH}.rpm"
            echo "RPM package copied: CC-Switch-${VERSION}-Linux-${ARCH}.rpm"
          else
            echo "No .rpm found (optional)"
          fi

      - name: List prepared assets
        shell: bash
        run: |
          ls -la release-assets || true

      - name: Collect Signatures
        shell: bash
        run: |
          set -euo pipefail
          echo "Collected signatures (if any alongside artifacts):"
          ls -la release-assets/*.sig || echo "No signatures found"

      - name: Upload release artifacts to workflow
        uses: actions/upload-artifact@v7
        with:
          name: release-assets-${{ runner.os }}-${{ matrix.arch || runner.arch }}
          path: release-assets/*
          if-no-files-found: error

      - name: List generated bundles (debug)
        if: always()
        shell: bash
        run: |
          echo "Listing bundles in target and src-tauri/target..."
          find target src-tauri/target -maxdepth 4 -type f -name "*.*" 2>/dev/null || true

      - name: Clean up Apple signing keychain
        if: runner.os == 'macOS' && always()
        shell: bash
        run: |
          if [ -n "${ORIGINAL_DEFAULT_KEYCHAIN:-}" ]; then
            security default-keychain -s "$ORIGINAL_DEFAULT_KEYCHAIN" || true
          fi
          if [ -f "$RUNNER_TEMP/build.keychain-db" ]; then
            security delete-keychain "$RUNNER_TEMP/build.keychain-db" || true
          fi

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-22.04
    needs: release
    permissions:
      contents: write
    steps:
      - name: Download built release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: List downloaded release artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -la release-assets

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: CC Switch ${{ github.ref_name }}
          prerelease: true
          body: |
            ## CC Switch ${{ github.ref_name }}

            🌐 **Only Official Website / 唯一官方网站 / 唯一の公式サイト**: [ccswitch.io](https://ccswitch.io)

            Claude Code 供应商切换工具

            ### 下载

            - **macOS (Intel x86_64)**: `CC-Switch-${{ github.ref_name }}-macOS-x86_64.dmg`、`CC-Switch-${{ github.ref_name }}-macOS-x86_64.zip`，以及用于自动更新的 `CC-Switch-${{ github.ref_name }}-macOS-x86_64.tar.gz`
            - **Windows**: `CC-Switch-${{ github.ref_name }}-Windows-Setup.exe`（安装版）或 `CC-Switch-${{ github.ref_name }}-Windows-Portable.zip`（绿色版）
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  assemble-latest-json:
    name: Assemble latest.json
    runs-on: ubuntu-22.04
    needs: publish-release
    permissions:
      contents: write
    steps:
      - name: Prepare GH
        run: |
          gh --version || (type -p curl >/dev/null && sudo apt-get update && sudo apt-get install -y gh || true)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Download all release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          TAG="${GITHUB_REF_NAME}"
          mkdir -p dl
          gh release download "$TAG" --dir dl --repo "$GITHUB_REPOSITORY"
          ls -la dl || true
      - name: Generate latest.json
        env:
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          base_url="https://github.com/$REPO/releases/download/$TAG"
          # 初始化空平台映射
          mac_url=""; mac_sig=""
          win_url=""; win_sig=""
          linux_x64_url=""; linux_x64_sig=""
          linux_arm64_url=""; linux_arm64_sig=""
          shopt -s nullglob
          for sig in dl/*.sig; do
            base=${sig%.sig}
            fname=$(basename "$base")
            url="$base_url/$fname"
            sig_content=$(cat "$sig")
            case "$fname" in
              *.tar.gz)
                # 视为 macOS updater artifact
                mac_url="$url"; mac_sig="$sig_content";;
              *-Linux-arm64.AppImage|*-Linux-arm64.appimage)
                linux_arm64_url="$url"; linux_arm64_sig="$sig_content";;
              *-Linux-x86_64.AppImage|*-Linux-x86_64.appimage)
                linux_x64_url="$url"; linux_x64_sig="$sig_content";;
              *.msi|*.exe)
                win_url="$url"; win_sig="$sig_content";;
            esac
          done
          # 构造 JSON（仅包含存在的目标）
          tmp_json=$(mktemp)
          {
            echo '{'
            echo "  \"version\": \"$VERSION\",";
            echo "  \"notes\": \"Release $TAG\",";
            echo "  \"pub_date\": \"$PUB_DATE\",";
            echo '  "platforms": {'
            first=1
            if [ -n "$mac_url" ] && [ -n "$mac_sig" ]; then
              # 为兼容 arm64 / x64，重复写入两个键，指向同一 universal 包
              for key in darwin-aarch64 darwin-x86_64; do
                [ $first -eq 0 ] && echo ','
                echo "    \"$key\": {\"signature\": \"$mac_sig\", \"url\": \"$mac_url\"}"
                first=0
              done
            fi
            if [ -n "$win_url" ] && [ -n "$win_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"windows-x86_64\": {\"signature\": \"$win_sig\", \"url\": \"$win_url\"}"
              first=0
            fi
            if [ -n "$linux_x64_url" ] && [ -n "$linux_x64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-x86_64\": {\"signature\": \"$linux_x64_sig\", \"url\": \"$linux_x64_url\"}"
              first=0
            fi
            if [ -n "$linux_arm64_url" ] && [ -n "$linux_arm64_sig" ]; then
              [ $first -eq 0 ] && echo ','
              echo "    \"linux-aarch64\": {\"signature\": \"$linux_arm64_sig\", \"url\": \"$linux_arm64_url\"}"
              first=0
            fi
            echo '  }'
            echo '}'
          } > "$tmp_json"
          echo "Generated latest.json:" && cat "$tmp_json"
          mv "$tmp_json" latest.json
      - name: Upload latest.json to release
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          if [ -f latest.json ]; then
            gh release upload "$GITHUB_REF_NAME" latest.json --clobber --repo "$GITHUB_REPOSITORY"
          else
            echo "latest.json not generated, skip upload"
          fi
